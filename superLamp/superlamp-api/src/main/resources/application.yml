spring:
  datasource:
    url: jdbc:h2:mem:superlamp
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://127.0.0.1:8080/realms/superLamp
          jwk-set-uri: http://127.0.0.1:8080/realms/superLamp/protocol/openid-connect/certs
